name: forestMapApp
description: A new Flutter project.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.0
  google_maps_flutter: ^0.5.33
  provider: ^4.3.2+3
  easy_mask: ^1.1.4
  bot_toast: ^3.0.5
  easy_localization: ^2.3.3
